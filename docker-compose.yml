services:
  app:
    build: ./docker/php
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_DATABASE=officina_hub
      - DB_USERNAME=officina
      - DB_PASSWORD=officina_secret

  web:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./public:/var/www/html/public:ro
      - caddy_data:/data

  db:
    image: mariadb:11
    environment:
      - MARIADB_DATABASE=officina_hub
      - MARIADB_USER=officina
      - MARIADB_PASSWORD=officina_secret
      - MARIADB_ROOT_PASSWORD=root_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data:
  caddy_data:
