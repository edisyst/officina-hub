<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Officina Hub</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#343a40;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;padding:24px}
    .icon{font-size:72px;margin-bottom:24px;animation:pulse 2s infinite}
    h1{font-size:2rem;margin-bottom:12px;font-weight:600}
    p{font-size:1.1rem;color:#adb5bd;max-width:420px;line-height:1.6}
    button{margin-top:32px;padding:14px 32px;font-size:1rem;background:#007bff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:500}
    button:hover{background:#0056b3}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Nessuna connessione</h1>
  <p>Connettiti alla rete dell'officina e riprova.</p>
  <button onclick="location.reload()">Riprova</button>
</body>
</html>
